<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衣服管理系統</title>
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://vzoijtlwqkrswjwmjrtk.supabase.co";
const supabaseKey = "sb_publishable_SknocZPTbwvkpGvI1gps1g_eIvw3SEM";

const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey
);
  
async function saveProduct(){

const name = document.querySelectorAll("input")[1].value;
const brand = document.querySelectorAll("input")[2].value;
const size = document.querySelectorAll("input")[3].value;


const { data, error } = await supabaseClient
.from("products")
.insert([
{
name:name,
brand:brand,
size:size
}
]);


if(error){
alert(error.message);
console.log(error);
}
else{
alert("新增成功");
}

}
  
</script>
<body>

<h1>👕 衣服管理系統</h1>

<h2>新增衣服</h2>

<form>

<label>衣服圖片：</label><br>
<input type="file"><br><br>

<label>衣服名稱：</label><br>
<input type="text" placeholder="例如：黑色帽T"><br><br>

<label>廠商：</label><br>
<input type="text" placeholder="例如：Nike"><br><br>

<label>尺寸：</label><br>
<input type="text" placeholder="例如：M"><br><br>

<button type="button" onclick="saveProduct()">
儲存
</button>

</form>

<h2>廠商分類</h2>

<ul>
<li>Nike</li>
<li>Adidas</li>
<li>其他</li>
</ul>

</body>
</html>
