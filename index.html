<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衣服管理系統</title>
</head>

<body>

<h1>👕 衣服管理系統</h1>

<h2>新增衣服</h2>

<form>

<label>衣服圖片：</label><br>
<input type="file"><br><br>

<label>衣服名稱：</label><br>
<input type="text" placeholder="例如：黑色帽T"><br><br>

<label>廠商：</label><br>
<input type="text" placeholder="例如：Nike"><br><br>

<label>尺寸：</label><br>
<input type="text" placeholder="例如：M"><br><br>

<button type="button">
儲存
</button>

</form>

<h2>廠商分類</h2>

<ul>
<li>Nike</li>
<li>Adidas</li>
<li>其他</li>
</ul>

</body>
</html>
